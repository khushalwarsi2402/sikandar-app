<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Sikandar Inventory</ion-title>
  </ion-toolbar>
</ion-header>
<ion-content class="ion-padding">
  <ion-card>
    <ion-card-header>
      <ion-card-title>Add New Stock</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <ion-item>
        <ion-input #nameInput label="Item Name:" placeholder="e.g. Chicken Tikka"></ion-input>
      </ion-item>
      <ion-item>
        <ion-input #priceInput type="number" label="Price (₹):" placeholder="e.g. 350"></ion-input>
      </ion-item>
      <ion-button expand="block" color="success" class="ion-margin-top" (click)="addItem(nameInput.value, priceInput.value)">
        Save Item
      </ion-button>
    </ion-card-content>
  </ion-card>
  <ion-button expand="block" class="ion-margin-top" (click)="loadInventory()">
    Load Inventory
  </ion-button>
  <div *ngIf="loading" class="ion-text-center ion-padding">
  <ion-spinner name="crescent"></ion-spinner>
  </div>
  <ion-list *ngIf="!loading && inventory.length > 0" class="ion-margin-top">
    <ion-item *ngFor="let item of inventory; trackBy: trackByIndex">
      <ion-label>
        <h2>{{ item.name }}</h2>
        <p>₹{{ item.price }}</p>
      </ion-label>
    </ion-item>
  </ion-list>
</ion-content>

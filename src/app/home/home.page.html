<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-title>
      Bismillah Fresh Meats
    </ion-title>
    
    <ion-buttons slot="end">
      <ion-icon 
        [name]="isAdmin ? 'lock-open-outline' : 'lock-closed-outline'" 
        (click)="toggleAdmin()" 
        class="admin-icon">
      </ion-icon>
    </ion-buttons>
    
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">
  
  <ion-card *ngIf="isAdmin">
    <ion-card-header>
      <ion-card-title>Update Stock</ion-card-title>
    </ion-card-header>
    
    <ion-card-content>
      <ion-item>
        <ion-label position="stacked">Item Name</ion-label>
        <ion-input [(ngModel)]="newItem.name" placeholder="e.g. Mutton Chops"></ion-input>
      </ion-item>

      <ion-item>
        <ion-label position="stacked">Price (₹)</ion-label>
        <ion-input type="number" [(ngModel)]="newItem.price" placeholder="e.g. 750"></ion-input>
      </ion-item>

      <ion-button expand="block" class="ion-margin-top" (click)="saveItem()">
        <ion-icon name="cloud-upload-outline" slot="start"></ion-icon>
        SAVE TO MONGODB
      </ion-button>
    </ion-card-content>
  </ion-card>

  <ion-button expand="block" fill="outline" class="ion-margin-vertical" (click)="loadInventory()">
    <ion-icon name="sync-outline" slot="start"></ion-icon>
    REFRESH INVENTORY
  </ion-button>

  <ion-list *ngIf="inventory.length > 0">
    <ion-list-header>
      <ion-label>Today's Live Prices</ion-label>
    </ion-list-header>

    <ion-item *ngFor="let item of inventory">
      <ion-avatar slot="start">
        <div class="avatar-badge">🥩</div>
      </ion-avatar>
      
      <ion-label>
        <h2><strong>{{ item.name }}</strong></h2>
        <p>Fresh Stock</p>
      </ion-label>
      
      <ion-badge color="success" slot="end">₹{{ item.price }}</ion-badge>
      
      <ion-button fill="clear" color="danger" slot="end" *ngIf="isAdmin" (click)="deleteItem(item._id || item.id)">
        <ion-icon name="trash-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-item>
  </ion-list>

  <div *ngIf="inventory.length === 0 && !loading" class="ion-text-center ion-margin-top no-items-text">
    <p>No items found. Unlock to add some meat!</p>
  </div>

  <div *ngIf="loading" class="ion-text-center ion-margin-top">
    <ion-spinner name="crescent"></ion-spinner>
    <p>Fetching live prices...</p>
  </div>

</ion-content>

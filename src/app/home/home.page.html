<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Bismillah Fresh Meats</ion-title>
    
    <ion-buttons slot="end">
      <ion-button (click)="adminLogin()">
        <ion-icon slot="icon-only" name="lock-closed-outline" *ngIf="!isAdmin"></ion-icon>
        <ion-icon slot="icon-only" name="lock-open-outline" *ngIf="isAdmin"></ion-icon>
      </ion-button>
    </ion-buttons>

  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  
  <ion-grid>
    <ion-row>
      
      <ion-col size="12" size-md="4" *ngIf="isAdmin">
        <ion-card class="ion-margin-bottom">
          <ion-card-header>
            <ion-card-title>Update Stock</ion-card-title>
          </ion-card-header>
          
          <ion-card-content>
            <ion-item lines="full">
              <ion-label position="stacked">Item Name</ion-label>
              <ion-input #itemName placeholder="e.g. Mutton Chops" type="text"></ion-input>
            </ion-item>

            <ion-item lines="full">
              <ion-label position="stacked">Price (₹)</ion-label>
              <ion-input #itemPrice placeholder="e.g. 750" type="number"></ion-input>
            </ion-item>

            <ion-button expand="block" class="ion-margin-top" 
                        (click)="addItem(itemName.value, itemPrice.value); itemName.value=''; itemPrice.value=''">
              <ion-icon name="cloud-upload-outline" slot="start"></ion-icon>
              Save to MongoDB
            </ion-button>
          </ion-card-content>
        </ion-card>
      </ion-col>

      <ion-col size="12" [sizeMd]="isAdmin ? 8 : 12">
        
        <ion-button expand="block" fill="outline" (click)="loadInventory()" class="ion-margin-bottom">
          <ion-icon slot="start" name="sync-outline"></ion-icon>
          Refresh Inventory
        </ion-button>

        <ion-list *ngIf="inventory && inventory.length > 0">
          <ion-list-header>
            <ion-label>Today's Live Prices</ion-label>
          </ion-list-header>

          <ion-item *ngFor="let item of inventory; trackBy: trackByIndex">
            <ion-avatar slot="start">
              <img alt="Meat" src="https://cdn-icons-png.flaticon.com/512/1046/1046769.png" />
            </ion-avatar>
            
            <ion-label>
              <h2 class="item-title">{{ $any(item).name }}</h2>
              <p>Fresh Stock</p>
            </ion-label>
            
            <ion-badge slot="end" color="success" class="price-badge">₹{{ $any(item).price }}</ion-badge>
            
            <ion-button fill="clear" color="danger" slot="end" (click)="deleteItem($any(item)._id)" *ngIf="isAdmin">
              <ion-icon name="trash-outline" slot="icon-only"></ion-icon>
            </ion-button>
          </ion-item>
        </ion-list>

        <div class="ion-text-center ion-padding" *ngIf="inventory.length === 0">
          <ion-text color="medium">
            <p>No items found. Check back later!</p>
          </ion-text>
        </div>

      </ion-col>

    </ion-row>
  </ion-grid>

</ion-content>
